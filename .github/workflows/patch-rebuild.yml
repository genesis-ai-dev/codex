name: Patch Rebuild (Force Build)

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number for a beta build (leave empty for patch rebuild)'
        required: false
        type: string
      quality:
        description: "Build quality (patch rebuild only)"
        required: false
        default: "stable"
        type: choice
        options:
          - stable
          - insider
      reason:
        description: 'Reason for rebuild (patch rebuild only)'
        required: false
        type: string

env:
  APP_NAME: Codex
  GH_REPO_PATH: ${{ github.repository }}
  ORG_NAME: ${{ github.repository_owner }}

jobs:
  prepare:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.issue.pull_request != null &&
       github.event.comment.body == '/build' &&
       (github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'))
    runs-on: ubuntu-latest
    outputs:
      is_pr_build: ${{ steps.classify.outputs.is_pr_build }}
      pr_number: ${{ steps.classify.outputs.pr_number }}
      head_sha: ${{ steps.classify.outputs.head_sha }}
      pr_version: ${{ steps.classify.outputs.pr_version }}
      ms_commit: ${{ steps.patch_prepare.outputs.ms_commit }}
      ms_tag: ${{ steps.patch_prepare.outputs.ms_tag }}
      release_version: ${{ steps.patch_prepare.outputs.release_version }}
      build_reason: ${{ steps.patch_prepare.outputs.build_reason }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.STRONGER_GITHUB_TOKEN }}

      - name: Classify trigger and resolve PR info
        id: classify
        uses: actions/github-script@v7
        with:
          script: |
            const isPr = context.eventName === 'issue_comment' ||
              (context.eventName === 'workflow_dispatch' && !!context.payload.inputs?.pr_number);
            core.setOutput('is_pr_build', String(isPr));
            if (!isPr) return;

            const pr_number = context.eventName === 'workflow_dispatch'
              ? Number(context.payload.inputs.pr_number)
              : context.issue.number;

            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr_number,
            });
            const headSha = pr.data.head.sha;
            const shortHash = headSha.slice(0, 7);

            const { execSync } = require('child_process');
            const msTag = JSON.parse(require('fs').readFileSync('./upstream/stable.json', 'utf8')).tag;
            const version = `${msTag}-pr${pr_number}-${shortHash}`;

            core.setOutput('pr_number', String(pr_number));
            core.setOutput('head_sha', headSha);
            core.setOutput('pr_version', version);

      - name: React to comment
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket',
            });

      # ── Patch rebuild path ────────────────────────────────────────────────
      - name: Prepare patch rebuild
        id: patch_prepare
        if: steps.classify.outputs.is_pr_build != 'true'
        env:
          VSCODE_QUALITY: ${{ github.event.inputs.quality }}
          BUILD_REASON: ${{ github.event.inputs.reason }}
        run: |
          echo "=== Patch Rebuild for ${VSCODE_QUALITY} ==="
          echo "Reason: ${BUILD_REASON}"

          if [[ ! -f "./upstream/${VSCODE_QUALITY}.json" ]]; then
            echo "Error: No upstream/${VSCODE_QUALITY}.json found"
            exit 1
          fi

          MS_COMMIT=$( jq -r '.commit' "./upstream/${VSCODE_QUALITY}.json" )
          MS_TAG=$( jq -r '.tag' "./upstream/${VSCODE_QUALITY}.json" )

          echo "Current VS Code base: ${MS_TAG} (${MS_COMMIT})"
          echo "ms_tag=${MS_TAG}" >> $GITHUB_OUTPUT
          echo "ms_commit=${MS_COMMIT}" >> $GITHUB_OUTPUT

          TIME_PATCH=$(printf "%04d" $(($(date +%-j) * 24 + $(date +%-H))))
          if [[ "${VSCODE_QUALITY}" == "insider" ]]; then
            RELEASE_VERSION="${MS_TAG}${TIME_PATCH}-insider"
          else
            RELEASE_VERSION="${MS_TAG}${TIME_PATCH}"
          fi

          echo "Generated rebuild version: ${RELEASE_VERSION}"
          echo "release_version=${RELEASE_VERSION}" >> $GITHUB_OUTPUT
          echo "build_reason=${BUILD_REASON}" >> $GITHUB_OUTPUT

          echo "=== PATCH REBUILD ===" > PATCH_REBUILD_INFO.md
          echo "**Build Version:** ${RELEASE_VERSION}" >> PATCH_REBUILD_INFO.md
          echo "**Base VS Code:** ${MS_TAG}" >> PATCH_REBUILD_INFO.md
          echo "**Rebuild Reason:** ${BUILD_REASON}" >> PATCH_REBUILD_INFO.md
          echo "**Build Date:** $(date)" >> PATCH_REBUILD_INFO.md
          echo "**Commit:** ${{ github.sha }}" >> PATCH_REBUILD_INFO.md

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add PATCH_REBUILD_INFO.md
          git commit -m "Patch rebuild: ${BUILD_REASON} (${RELEASE_VERSION})" || echo "No changes to commit"
          git push || echo "No changes to push"

  # ── Patch rebuild path: dispatch to platform workflows ───────────────────
  trigger-all-builds:
    needs: prepare
    if: needs.prepare.outputs.is_pr_build != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Trigger all platform builds
        env:
          GITHUB_TOKEN: ${{ secrets.STRONGER_GITHUB_TOKEN }}
          QUALITY: ${{ github.event.inputs.quality }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.release_version }}
          BUILD_REASON: ${{ needs.prepare.outputs.build_reason }}
        run: |
          echo "🚀 Triggering PATCH REBUILD for all platforms"
          echo "Version: ${RELEASE_VERSION}"
          echo "Reason: ${BUILD_REASON}"

          curl -sSf -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d "{
              \"event_type\": \"${QUALITY}\",
              \"client_payload\": {
                \"quality\": \"${QUALITY}\",
                \"patch_rebuild\": true,
                \"force_build\": true,
                \"build_reason\": \"${BUILD_REASON}\",
                \"release_version\": \"${RELEASE_VERSION}\"
              }
            }"

          echo "✅ Triggered all ${QUALITY} platform builds"

  # ── PR build path: build inline ──────────────────────────────────────────
  build-macos:
    needs: prepare
    if: needs.prepare.outputs.is_pr_build == 'true'
    runs-on: macos-14
    env:
      APP_NAME: Codex Beta
      BINARY_NAME: codex-beta
      RELEASE_VERSION: ${{ needs.prepare.outputs.pr_version }}
      CUSTOM_RELEASE_VERSION: ${{ needs.prepare.outputs.pr_version }}
      VSCODE_QUALITY: stable

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.head_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Build
        run: ./dev/build.sh -sp

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: assets/*.dmg
          retention-days: 3

  compile-windows:
    needs: prepare
    if: needs.prepare.outputs.is_pr_build == 'true'
    runs-on: ubuntu-22.04
    env:
      APP_NAME: Codex Beta
      BINARY_NAME: codex-beta
      RELEASE_VERSION: ${{ needs.prepare.outputs.pr_version }}
      CUSTOM_RELEASE_VERSION: ${{ needs.prepare.outputs.pr_version }}
      VSCODE_ARCH: x64
      VSCODE_QUALITY: stable
      SHOULD_BUILD_REH: 'no'
      SHOULD_BUILD_REH_WEB: 'no'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.head_sha }}

      - name: Setup GCC
        uses: egor-tensin/setup-gcc@v1
        with:
          version: 10
          platform: x64

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Setup Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install libkrb5-dev
        run: sudo apt-get update -y && sudo apt-get install -y libkrb5-dev

      - name: Clone VSCode repo
        run: ./get_repo.sh

      - name: Build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./build.sh

      - name: Compress vscode artifact
        run: |
          find vscode -type f \
            -not -path "*/node_modules/*" \
            -not -path "vscode/.build/node/*" \
            -not -path "vscode/.git/*" > vscode.txt
          echo "vscode/.build/extensions/node_modules" >> vscode.txt
          echo "vscode/.git" >> vscode.txt
          tar -czf vscode.tar.gz -T vscode.txt

      - name: Upload vscode artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-compiled
          path: ./vscode.tar.gz
          retention-days: 1

  build-windows:
    needs: [prepare, compile-windows]
    if: needs.prepare.outputs.is_pr_build == 'true'
    runs-on: windows-2022
    defaults:
      run:
        shell: bash
    env:
      APP_NAME: Codex Beta
      BINARY_NAME: codex-beta
      RELEASE_VERSION: ${{ needs.prepare.outputs.pr_version }}
      CUSTOM_RELEASE_VERSION: ${{ needs.prepare.outputs.pr_version }}
      VSCODE_ARCH: x64
      VSCODE_QUALITY: stable

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.head_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Setup Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download compiled vscode
        uses: actions/download-artifact@v4
        with:
          name: vscode-compiled

      - name: Extract vscode artifact
        run: tar -xzf vscode.tar.gz

      - name: Build Windows package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          npm_config_arch: x64
          npm_config_target_arch: x64
        run: ./build/windows/package.sh

      - name: Prepare assets
        run: ./prepare_assets.sh

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            assets/*.exe
            assets/*.msi
          retention-days: 3

  release:
    needs: [prepare, build-macos, build-windows]
    if: needs.prepare.outputs.is_pr_build == 'true'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.STRONGER_GITHUB_TOKEN }}
      VERSION: ${{ needs.prepare.outputs.pr_version }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.head_sha }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create prerelease
        run: |
          gh release create "$VERSION" \
            --target "${{ needs.prepare.outputs.head_sha }}" \
            --prerelease \
            --title "Codex Beta $VERSION" \
            --generate-notes \
            artifacts/macos-arm64/*.dmg \
            artifacts/windows-x64/*.exe \
            artifacts/windows-x64/*.msi

      - name: Comment on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/${VERSION}"
          gh pr comment "${{ needs.prepare.outputs.pr_number }}" \
            --body "Pre-release build ready: [$VERSION]($RELEASE_URL)"
