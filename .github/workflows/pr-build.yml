name: PR Build

on:
  issue_comment:
    types: [created]
  workflow_call:
    inputs:
      pr_number:
        type: string
        required: true
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR Number'
        type: string
        required: true

jobs:
  prepare:
    if: |
      github.event_name != 'issue_comment' ||
      (github.event.issue.pull_request != null &&
       github.event.comment.body == '/build' &&
       (github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'))
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      head_sha: ${{ steps.pr.outputs.head_sha }}
      pr_number: ${{ steps.pr.outputs.pr_number }}

    steps:
      - name: Get PR head SHA
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr_number = context.eventName === 'issue_comment'
              ? context.issue.number
              : Number('${{ inputs.pr_number }}');
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr_number,
            });
            core.setOutput('head_sha', pr.data.head.sha);
            core.setOutput('pr_number', String(pr_number));

      - name: React to comment
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket',
            });

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head_sha }}

      - name: Compute version
        id: version
        run: |
          MS_TAG=$(jq -r '.tag' ./upstream/stable.json)
          SHORT_HASH=$(git rev-parse --short HEAD)
          echo "version=${MS_TAG}-pr${{ steps.pr.outputs.pr_number }}-${SHORT_HASH}" >> "$GITHUB_OUTPUT"

  build-macos:
    needs: prepare
    runs-on: macos-14
    env:
      APP_NAME: Codex Beta
      BINARY_NAME: codex-beta
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
      CUSTOM_RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
      VSCODE_QUALITY: stable

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.head_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CERTIFICATE_OSX_APP_PASSWORD: ${{ secrets.CERTIFICATE_OSX_APP_PASSWORD }}
          CERTIFICATE_OSX_ID: ${{ secrets.CERTIFICATE_OSX_ID }}
          CERTIFICATE_OSX_P12_DATA: ${{ secrets.CERTIFICATE_OSX_P12 }}
          CERTIFICATE_OSX_P12_PASSWORD: ${{ secrets.CERTIFICATE_OSX_P12_PASSWORD }}
          CERTIFICATE_OSX_TEAM_ID: ${{ secrets.CERTIFICATE_OSX_TEAM_ID }}
        run: ./dev/build.sh -p

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: assets/*.dmg
          retention-days: 3

  # Windows build is disabled pending fixes to the cross-compile pipeline.
